[package]
name = "gambling"
version = "0.1.0"
description = "Time-alive gambling mechanics for Geometry Dash"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "gambling"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
idl-build = ["anchor-lang/idl-build"]
default = []

[dependencies]
anchor-lang = "0.32.1"

[dev-dependencies]
solana-program-test = "2.2.1"
solana-sdk = "2.2.1"
